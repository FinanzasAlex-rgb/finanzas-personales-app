<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Personales</title>
    <!-- PWA -->
    <link rel="manifest" href="/assets/manifest.json">
    <meta name="theme-color" content="#1a1c29">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dark-theme">

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-wallet"></i>
            <span>Finanzas VIP</span>
        </div>

        <ul class="nav-links">
            <li class="active" data-target="dashboard"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></li>
            <li data-target="ingresos"><i class="fa-solid fa-arrow-trend-up"></i><span>Ingresos</span></li>
            <li data-target="gastos"><i class="fa-solid fa-receipt"></i><span>Gastos Fijos</span></li>
            <li data-target="tarjetas"><i class="fa-brands fa-cc-visa"></i><span>Tarjetas de Crédito</span></li>
            <li data-target="prestamos"><i class="fa-solid fa-building-columns"></i><span>Préstamos</span></li>
            <li data-target="personales"><i class="fa-solid fa-basket-shopping"></i><span>Gastos Personales</span></li>
            <li data-target="coach"><i class="fa-solid fa-robot"></i><span>Coach IA</span></li>
            <li class="nav-bottom" data-target="configuracion"><i
                    class="fa-solid fa-gear"></i><span>Configuración</span></li>
        </ul>
    </nav>

    <!-- Main Workspace -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <h1 id="page-title">Dashboard</h1>
            <div class="user-profile">
                <span class="date-display" id="current-date"></span>
                <div class="avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <!-- Dynamic Views Container -->
        <div id="views-container">
            <!-- Loading state -->
            <div class="loading-state" style="display: none;">
                <div class="spinner"></div>
            </div>

            <!-- Dashboard View -->
            <section id="dashboard" class="view active">
                <div class="kpi-grid">
                    <div class="kpi-card premium-card">
                        <div class="kpi-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                        <div class="kpi-info">
                            <p>Saldo Disponible</p>
                            <h2 id="saldo-disponible">$0.00</h2>
                        </div>
                    </div>
                    <div class="kpi-card premium-card">
                        <div class="kpi-icon caution"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
                        <div class="kpi-info">
                            <p>Obligaciones Mensuales</p>
                            <h2 id="obligaciones-mensuales">$0.00</h2>
                        </div>
                    </div>
                </div>

                <div class="charts-grid mt-4">
                    <div class="premium-card chart-container">
                        <h3>Tendencia de Ingresos vs Gastos</h3>
                        <canvas id="trendChart"></canvas>
                    </div>
                    <div class="premium-card chart-container">
                        <h3>Distribución de Gastos</h3>
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
</body>

</html>
